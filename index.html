<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports IPTV - Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f0f13; color: #ffffff; font-family: 'Poppins', sans-serif; padding-bottom: 50px; overflow-x: hidden;}

        header { background-color: #1a1a24; padding: 20px 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: #ff2a5f; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5rem; }
        
        .auth-btn { background: #23232f; color: white; border: 1px solid #ff2a5f; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .auth-btn:hover { background: #ff2a5f; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .main-layout { display: flex; flex-direction: column; gap: 20px; transition: all 0.3s ease; }

        .video-area { width: 100%; position: sticky; top: 0; z-index: 999; background: #0f0f13; padding-top: 10px; padding-bottom: 15px; }
        .channels-area { width: 100%; transition: width 0.4s ease; }

        @media (min-width: 992px) {
            .main-layout { flex-direction: row; align-items: flex-start; gap: 30px; }
            .video-area { width: 75%; top: 20px; padding-top: 0; padding-bottom: 0; }
            .channels-area { width: 100%; } 
            .main-layout.video-playing .channels-area { width: 25%; }
        }

        /* Plyr প্লেয়ারের কাস্টম ডিজাইন */
        .video-wrapper { background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.9); border: 2px solid #2a2a35; }
        --plyr-color-main: #ff2a5f; /* প্লেয়ারের থিম কালার লাল করে দেওয়া হলো */
        
        .now-playing { margin-top: 15px; font-size: 1.1rem; font-weight: 600; color: #a0a0b0; display: flex; justify-content: space-between; align-items: center; background: #1a1a24; padding: 15px 20px; border-radius: 10px;}
        .now-playing span { color: #fff; display: block; margin-top: 5px;}
        
        .close-player-btn { background: #ff2a5f; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .close-player-btn:hover { background: #d11f4a; }

        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;}
        .filter-btn { background: #23232f; border: 2px solid transparent; padding: 8px 15px; color: white; border-radius: 25px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.3s ease; }
        .filter-btn:hover, .filter-btn.active { border-color: #ff2a5f; background: #2a2a35; box-shadow: 0 4px 15px rgba(255, 42, 95, 0.3); }

        .channel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 50px; }
        .channel-card { background: #23232f; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent; position: relative; }
        .channel-card h3 { font-size: 0.9rem; margin-bottom: 5px; }
        .channel-card p { font-size: 0.75rem; color: #888; }
        .channel-card:hover { transform: translateY(-3px); border-color: #ff2a5f; box-shadow: 0 8px 20px rgba(255, 42, 95, 0.3); background: #2a2a35; }

        .delete-btn { background: #ff2a5f; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 0.8rem; width: 100%; }
        .delete-btn:hover { background: #d11f4a; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .admin-panel { background: #1a1a24; padding: 30px; border-radius: 12px; border: 1px dashed #ff2a5f; width: 90%; max-width: 500px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto;}
        .close-modal { position: absolute; top: 15px; right: 20px; color: #888; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .close-modal:hover { color: #ff2a5f; }
        .admin-panel h2 { color: #ff2a5f; margin-bottom: 20px; text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2a2a35; color: white; font-family: 'Poppins', sans-serif; margin-top: 5px; }
        .submit-btn { width: 100%; background: #ff2a5f; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        
        .hidden { display: none !important; }

        @media (max-width: 768px) { header { flex-direction: column; gap: 10px; } .now-playing { flex-direction: column; gap: 10px; text-align: center; } }
    </style>
</head>
<body>

    <header>
        <h1 onclick="secretAdminLogin()" style="cursor: pointer; user-select: none;" title="Live Sports">Live Sports IPTV</h1>
    </header>

    <div class="container">
        
        <div id="admin-actions" class="hidden" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
            <button onclick="openModal('add-modal')" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; cursor: pointer;">+ Add Channels</button>
            <button onclick="openModal('category-modal')" style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; cursor: pointer;">📂 Manage Categories</button>
            <button onclick="deleteAllChannels()" style="background: #ff2a5f; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; cursor: pointer;">🗑️ Delete All</button>
            <button onclick="toggleAuth()" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; cursor: pointer;">🚪 Sign Out</button>
        </div>

        <div class="main-layout">
            
            <div class="video-area hidden" id="video-section">
                <div class="video-wrapper">
                    <video id="my-video" controls playsinline crossorigin="anonymous"></video>
                </div>
                <div class="now-playing">
                    <div>Now Playing: <span id="current-channel-name" style="color: #ff2a5f; font-size: 1.2rem;">Select a Channel</span></div>
                    <button onclick="closePlayer()" class="close-player-btn">✖ Close Video</button>
                </div>
            </div>

            <div class="channels-area">
                <div class="filters" id="dynamic-filters">
                    <button class="filter-btn active" onclick="filterChannels('All', this)">All</button>
                </div>
                <div id="loading-spinner" style="text-align: center; padding: 30px; font-size: 1.2rem; color: #ff2a5f; display: none; font-weight: 600;">
                    ⏳ Loading Channels... Please Wait.
                </div>
                <div class="channel-grid" id="channels"></div>
            </div>

        </div>

        <div id="add-modal" class="modal-overlay hidden">
            <div class="admin-panel">
                <span class="close-modal" onclick="closeModal('add-modal')">&times;</span>
                <h2>⚙️ Add Single Channel</h2>
                <form id="add-channel-form">
                    <div class="form-group"><input type="text" id="channel-name" placeholder="Channel Name" required></div>
                    <div class="form-group"><input type="text" id="channel-category" placeholder="Category (e.g., Cricket)" required></div>
                    <div class="form-group"><input type="url" id="channel-url" placeholder="M3U8 Streaming URL" required></div>
                    <button type="submit" class="submit-btn">Save Channel</button>
                </form>
                <hr style="border: 1px dashed #333; margin: 25px 0;">
                <h2 style="font-size: 1.2rem;">📂 Bulk Upload (M3U Playlist)</h2>
                <div class="form-group"><input type="file" id="m3u-file" accept=".m3u,.m3u8" style="padding: 10px; background: #2a2a35; border-radius: 8px; width: 100%;"></div>
                <button onclick="uploadM3UFile()" style="background: #007bff;" class="submit-btn">Upload & Extract</button>
            </div>
        </div>

        <div id="category-modal" class="modal-overlay hidden">
            <div class="admin-panel">
                <span class="close-modal" onclick="closeModal('category-modal')">&times;</span>
                <h2>📂 Manage Categories</h2>
                <div class="form-group">
                    <label style="color:#a0a0b0; font-size:0.9rem;">Select Category:</label>
                    <select id="manage-category-select"></select>
                </div>
                <div class="form-group">
                    <label style="color:#a0a0b0; font-size:0.9rem;">Rename To (Optional):</label>
                    <input type="text" id="new-category-name" placeholder="New Category Name">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="renameCategory()" class="submit-btn" style="background: #007bff; flex: 1;">✏️ Rename</button>
                    <button onclick="deleteCategory()" class="submit-btn" style="background: #ff2a5f; flex: 1;">🗑️ Delete</button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        // ==========================================
        // আপনার রেন্ডারের লাইভ API লিংকটি দিন 
        // ==========================================
        const API_BASE_URL = 'https://sports-iptv-backend.onrender.com';
        // এখানে আপনার কপি করা গিটহাবের JSON লিংকটি বসিয়ে দিন
        const AUTO_JSON_URL = 'https://raw.githubusercontent.com/freelancerrakib2007/toffee-auto/refs/heads/main/channels.json';

        const videoElement = document.getElementById('my-video');
        const channelGrid = document.getElementById('channels');
        const adminActions = document.getElementById('admin-actions');
        const authBtn = document.getElementById('auth-btn');
        const videoSection = document.getElementById('video-section');
        const mainLayout = document.querySelector('.main-layout');
        let allChannelsData = [];
        let uniqueCategories = [];
        let isAdmin = localStorage.getItem('isAdmin') === 'true';

        // Plyr প্লেয়ার ইনিশিয়ালাইজেশন
        const player = new Plyr(videoElement, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['quality', 'speed'],
            autoplay: true
        });
        
        let hls; // Hls.js ভ্যারিয়েবল

        // প্লেয়ার অটো-রোটেট ফিক্স
        player.on('enterfullscreen', async event => {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                } else if (screen.lockOrientation) {
                    screen.lockOrientation('landscape');
                }
            } catch (error) { console.log('Browser blocked auto-rotate'); }
        });

        player.on('exitfullscreen', event => {
            try {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                } else if (screen.unlockOrientation) {
                    screen.unlockOrientation();
                }
            } catch (error) {}
        });

        // ভিডিও প্লে করার জন্য অত্যাধুনিক Hls.js ফাংশন
        function playChannel(url, name) {
            videoSection.classList.remove('hidden');
            mainLayout.classList.add('video-playing'); 
            document.getElementById('current-channel-name').innerText = name;

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // আগের ভিডিও পুরোপুরি ক্লিয়ার করে দেবে
                }
                
                // স্লো ইন্টারনেটের জন্য স্মার্ট বাফারিং কনফিগারেশন
                hls = new Hls({
                    maxBufferLength: 30, // খুব বেশি বাফার করে ইন্টারনেট খরচ করবে না
                    maxMaxBufferLength: 60,
                    liveSyncDurationCount: 3,
                    enableWorker: true,
                    lowLatencyMode: true // লাইভ টিভির জন্য লো-ল্যাটেন্সি
                });
                
                hls.loadSource(url);
                hls.attachMedia(videoElement);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    player.play();
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                // আইফোন বা সাফারি ব্রাউজারের জন্য
                videoElement.src = url;
                videoElement.addEventListener('loadedmetadata', function () {
                    player.play();
                });
            }

            if (window.innerWidth <= 992) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function closePlayer() { 
            videoSection.classList.add('hidden'); 
            mainLayout.classList.remove('video-playing'); 
            player.pause(); 
            if(hls) { hls.destroy(); } // প্লেয়ার বন্ধ করলে ডেটা টানা বন্ধ হয়ে যাবে
        }

        function openModal(modalId) { 
            document.getElementById(modalId).classList.remove('hidden'); 
            if(modalId === 'category-modal') populateCategoryDropdown();
        }
        function closeModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }
        
        window.onclick = function(event) { 
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.add('hidden');
            }
        }

        // --- সিক্রেট লগইন লজিক ---
        let clickCount = 0;
        let clickTimer;
        function secretAdminLogin() {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1500); // ১.৫ সেকেন্ডের মধ্যে ৩ বার ক্লিক করতে হবে
            if(clickCount >= 3) {
                toggleAuth();
                clickCount = 0;
            }
        }

        function toggleAuth() {
            if (isAdmin) {
                localStorage.setItem('isAdmin', 'false'); isAdmin = false;
                alert("Logged out successfully!"); updateUI();
            } else {
                const password = prompt("Enter Secret Admin Password:");
                if(password) {
                    fetch(`${API_BASE_URL}/api/login`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: password })
                    }).then(res => {
                        if(res.ok) { localStorage.setItem('isAdmin', 'true'); isAdmin = true; alert("Login successful!"); updateUI(); } 
                        else { alert("Incorrect Password!"); }
                    });
                }
            }
        }

        function updateUI() {
            // আগের authBtn সংক্রান্ত কোড মুছে দেওয়া হয়েছে
            if (isAdmin) { adminActions.classList.remove('hidden'); } 
            else { adminActions.classList.add('hidden'); closeModal('add-modal'); closeModal('category-modal'); }
            displayChannels(allChannelsData);
        }

        function loadChannels() {
            document.getElementById('loading-spinner').style.display = 'block'; // লোডিং শুরু
            document.getElementById('channels').innerHTML = ''; // আগের চ্যানেল হাইড

            fetch(`${API_BASE_URL}/api/channels`)
                .then(res => res.json())
                .then(dbChannels => {
                    if(AUTO_JSON_URL !== '' && AUTO_JSON_URL.includes('http')) {
                        fetch(AUTO_JSON_URL)
                            .then(res => res.json())
                            .then(autoChannels => {
                                const formattedAutoChannels = autoChannels.map(ch => ({
                                    id: 'auto-' + Math.random(),
                                    name: ch.name || ch.title || ch.channel_name || 'Unknown Channel',
                                    category: ch.category || ch.group_title || ch.group || 'Auto Updated',
                                    url: ch.url || ch.link || ch.stream_url,
                                    isAuto: true
                                }));
                                allChannelsData = [...dbChannels, ...formattedAutoChannels];
                                document.getElementById('loading-spinner').style.display = 'none'; // লোডিং শেষ
                                generateCategoryFilters(); 
                                displayChannels(allChannelsData);
                            })
                            .catch(err => {
                                allChannelsData = dbChannels;
                                document.getElementById('loading-spinner').style.display = 'none';
                                generateCategoryFilters(); displayChannels(allChannelsData);
                            });
                    } else {
                        allChannelsData = dbChannels;
                        document.getElementById('loading-spinner').style.display = 'none';
                        generateCategoryFilters(); displayChannels(allChannelsData);
                    }
                })
                .catch(err => {
                    document.getElementById('loading-spinner').innerText = '❌ Error connecting to database.';
                });
        }

        function generateCategoryFilters() {
            const filtersDiv = document.getElementById('dynamic-filters');
            filtersDiv.innerHTML = '<button class="filter-btn active" onclick="filterChannels(\'All\', this)">All</button>';
            
            uniqueCategories = [...new Set(allChannelsData.map(c => c.category))].filter(Boolean);
            uniqueCategories.forEach(cat => {
                filtersDiv.innerHTML += `<button class="filter-btn" onclick="filterChannels('${cat}', this)">${cat}</button>`;
            });
        }

        function populateCategoryDropdown() {
            const select = document.getElementById('manage-category-select');
            select.innerHTML = '';
            uniqueCategories.forEach(cat => { select.innerHTML += `<option value="${cat}">${cat}</option>`; });
        }

        function displayChannels(channels) {
            channelGrid.innerHTML = '';
            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<h3>${channel.name}</h3><p>${channel.category}</p>`;
                
                // চ্যানেলে ক্লিক করলে নতুন playChannel ফাংশনটি কল হবে
                card.onclick = () => {
                    playChannel(channel.url, channel.name);
                };

                // ---- আপডেট হওয়া অংশ শুরু ----
                if(isAdmin && !channel.isAuto) {
                    // ডেটাবেসের চ্যানেলের জন্য ডিলিট বাটন
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerText = '🗑️ Delete';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteChannel(channel.id); };
                    card.appendChild(delBtn);
                } else if (isAdmin && channel.isAuto) {
                    // অটো-আপডেট চ্যানেলের জন্য একটি সুন্দর ব্যাজ (ডিলিট বাটন থাকবে না)
                    const autoBadge = document.createElement('p');
                    autoBadge.style.color = '#007bff';
                    autoBadge.style.fontSize = '0.75rem';
                    autoBadge.style.marginTop = '10px';
                    autoBadge.style.fontWeight = 'bold';
                    autoBadge.innerText = '⚡ Auto Updated';
                    card.appendChild(autoBadge);
                }
                // ---- আপডেট হওয়া অংশ শেষ ----

                channelGrid.appendChild(card);
            });
        }

        function deleteChannel(id) {
            if(confirm("Are you sure you want to delete this channel?")) {
                fetch(`${API_BASE_URL}/api/channels/${id}`, { method: 'DELETE' }).then(() => loadChannels());
            }
        }

        function deleteAllChannels() {
            if(confirm("Are you ABSOLUTELY sure you want to delete ALL channels?")) {
                fetch(`${API_BASE_URL}/api/channels/all/delete`, { method: 'DELETE' })
                .then(res => res.json()).then(data => { alert(data.message || "Error"); loadChannels(); });
            }
        }

        function renameCategory() {
            const oldName = document.getElementById('manage-category-select').value;
            const newName = document.getElementById('new-category-name').value;
            if(!newName) return alert("Enter a new name!");
            
            fetch(`${API_BASE_URL}/api/categories`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ old_name: oldName, new_name: newName })
            })
            .then(res => res.json()).then(data => {
                alert(data.message);
                document.getElementById('new-category-name').value = '';
                closeModal('category-modal'); loadChannels();
            });
        }

        function deleteCategory() {
            const catName = document.getElementById('manage-category-select').value;
            if(confirm(`Delete category "${catName}" AND ALL its channels?`)) {
                fetch(`${API_BASE_URL}/api/categories/${encodeURIComponent(catName)}`, { method: 'DELETE' })
                .then(res => res.json()).then(data => {
                    alert(data.message); closeModal('category-modal'); loadChannels();
                });
            }
        }

        function filterChannels(category, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            if(category === 'All') displayChannels(allChannelsData);
            else displayChannels(allChannelsData.filter(ch => ch.category === category));
        }

        document.getElementById('add-channel-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = this.querySelector('.submit-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "⏳ Saving..."; // বাটনে লোডিং দেখাবে
            submitBtn.disabled = true;

            const newChannel = { name: document.getElementById('channel-name').value, category: document.getElementById('channel-category').value, url: document.getElementById('channel-url').value };
            fetch(`${API_BASE_URL}/api/channels`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newChannel) })
            .then(() => { document.getElementById('add-channel-form').reset(); closeModal('add-modal'); loadChannels(); })
            .finally(() => { submitBtn.innerText = originalText; submitBtn.disabled = false; }); // কাজ শেষে আবার আগের মতো হবে
        });

        function uploadM3UFile() {
            const fileInput = document.getElementById('m3u-file');
            const file = fileInput.files[0];
            if (!file) return alert("Please select an M3U file first.");
            
            const btn = document.querySelector('button[onclick="uploadM3UFile()"]');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Uploading & Extracting..."; // বাটনে লোডিং দেখাবে
            btn.disabled = true;

            const formData = new FormData(); formData.append("file", file);
            fetch(`${API_BASE_URL}/api/upload-m3u`, { method: 'POST', body: formData })
            .then(res => res.json()).then(data => { 
                if(data.message) { alert(data.message); } else { alert(data.detail); }
                fileInput.value = ""; closeModal('add-modal'); loadChannels(); 
            })
            .finally(() => { btn.innerText = originalText; btn.disabled = false; }); // কাজ শেষে আবার আগের মতো হবে
        }

        updateUI(); loadChannels();
    </script>
</body>
</html>
